sonar.organization=cleberbrant
sonar.projectKey=Cleberbrant_cyber-access-shield

sonar.projectName=Cyber Access Shield
sonar.projectVersion=1.0.0

# Source code settings
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Coverage exclusions (components/pages/hooks require React Testing Library)
sonar.coverage.exclusions=src/components/**/*.tsx,src/pages/**/*.tsx,src/hooks/**/*.ts,src/integrations/**/*.ts,src/App.tsx,src/main.tsx

# TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
