<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow-cyan" cx="0.2" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-violet" cx="0.85" cy="0.9" r="0.6">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#1e2535" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#07090F"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>
  <rect width="1200" height="630" fill="url(#glow-violet)"/>

  <!-- Escudo central -->
  <g transform="translate(508, 120) scale(5.75)">
    <path d="M16 2.5 L27 7 V15.5 C27 22.5 22.5 27.5 16 29.5 C9.5 27.5 5 22.5 5 15.5 V7 Z" stroke="url(#brand)" stroke-width="2" stroke-linejoin="round" fill="none"/>
    <path d="M10.5 16.5 L14 20 L21.5 11.5" stroke="url(#brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="21.5" cy="11.5" r="1.6" fill="url(#brand)"/>
  </g>

  <text x="600" y="400" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="700" fill="#F1F5F9">CyberAccess<tspan fill="url(#brand)">Shield</tspan></text>
  <text x="600" y="455" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="#94A3B8">Plataforma de avaliação segura para ambientes EAD</text>

  <rect x="500" y="500" width="200" height="3" rx="1.5" fill="url(#brand)"/>
</svg>
