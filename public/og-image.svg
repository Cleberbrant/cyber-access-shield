<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Shield icon -->
  <g transform="translate(120, 185)">
    <path d="M130 20 L220 55 L220 130 C220 175 178 210 130 232 C82 210 40 175 40 130 L40 55 Z"
          fill="url(#shield-grad)" stroke="#1e40af" stroke-width="3"/>
    <!-- Lock body -->
    <rect x="88" y="125" width="84" height="62" rx="10" fill="white" opacity="0.95"/>
    <!-- Lock shackle -->
    <path d="M100 125 L100 105 Q100 80 130 80 Q160 80 160 105 L160 125"
          stroke="white" stroke-width="13" stroke-linecap="round" fill="none" opacity="0.95"/>
    <!-- Keyhole -->
    <circle cx="130" cy="153" r="11" fill="#3b82f6"/>
    <rect x="125" y="160" width="10" height="16" rx="3" fill="#3b82f6"/>
  </g>

  <!-- Title -->
  <text x="380" y="268" font-family="system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="white" letter-spacing="-1">
    CyberAccess
  </text>
  <text x="380" y="348" font-family="system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#3b82f6" letter-spacing="-1">
    Shield
  </text>

  <!-- Subtitle -->
  <text x="380" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="30" fill="#94a3b8" letter-spacing="0">
    Plataforma de avaliação segura para ambientes EAD
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#3b82f6" opacity="0.15"/>
  <text x="380" y="603" font-family="system-ui, -apple-system, sans-serif"
        font-size="24" fill="#64748b">
    cyber-access-shield.vercel.app
  </text>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="120" fill="#3b82f6" opacity="0.05"/>
  <circle cx="1050" cy="530" r="80" fill="#3b82f6" opacity="0.07"/>
</svg>
