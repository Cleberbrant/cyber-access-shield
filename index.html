<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <title>CyberAccessShield</title>
  <meta name="description" content="Plataforma de avaliação segura para ambientes EAD" />
  <meta name="author" content="CyberAccessShield" />

  <meta property="og:title" content="CyberAccessShield" />
  <meta property="og:description" content="Plataforma de avaliação segura para ambientes EAD" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@lovable_dev" />
  <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
</head>

<body>
  <div id="root"></div>
  <!-- Camada 1: Bloqueio global de atalhos DevTools (executa antes do React) -->
  <script>
    (function () {
      'use strict';
      // Bloquear atalhos de teclado para DevTools
      document.addEventListener('keydown', function (e) {
        // F12
        if (e.key === 'F12' || e.keyCode === 123) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && (
          e.key === 'I' || e.key === 'i' ||
          e.key === 'J' || e.key === 'j' ||
          e.key === 'C' || e.key === 'c'
        )) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // Ctrl+U (view source)
        if (e.ctrlKey && (e.key === 'U' || e.key === 'u') && !e.shiftKey && !e.altKey) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
      // Bloquear menu de contexto (clique direito)
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault();
        return false;
      }, true);
    })();
  </script>
  <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
